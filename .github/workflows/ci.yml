name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            cc: gcc-14
            cxx: g++-14
            name: Linux GCC
            lint: false
          - os: ubuntu-24.04
            cc: clang-22
            cxx: clang++-22
            name: Linux Clang
            lint: true
          - os: macos-14
            cc: clang
            cxx: clang++
            name: macOS
            lint: false

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
          sudo apt-get install -y -qq libz3-dev
          echo "LLVM_DIR=/usr/lib/llvm-22/lib/cmake/llvm" >> "$GITHUB_ENV"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm z3
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          {
            echo "LLVM_DIR=${LLVM_PREFIX}/lib/cmake/llvm"
            echo "CC=${LLVM_PREFIX}/bin/clang"
            echo "CXX=${LLVM_PREFIX}/bin/clang++"
            echo "LDFLAGS=-L${LLVM_PREFIX}/lib/c++ -Wl,-rpath,${LLVM_PREFIX}/lib/c++"
          } >> "$GITHUB_ENV"

      - name: Cache GoogleTest
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: build-deps/install
          key: deps-${{ matrix.os }}-${{ matrix.cc }}-gtest1.16.0-hwy1.3.0

      - name: Build dependencies
        run: |
          cmake -S dependencies -B build-deps \
            -DCMAKE_C_COMPILER="${CC:-${{ matrix.cc }}}" \
            -DCMAKE_CXX_COMPILER="${CXX:-${{ matrix.cxx }}}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_EXTERNAL_LLVM=ON
          cmake --build build-deps

      - name: Build CoBRA
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER="${CC:-${{ matrix.cc }}}" \
            -DCMAKE_CXX_COMPILER="${CXX:-${{ matrix.cxx }}}" \
            -DCMAKE_PREFIX_PATH="$(pwd)/build-deps/install" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-march=native"
          cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: clang-format check
        if: matrix.lint
        run: |
          find include lib tools \( -name '*.h' -o -name '*.cpp' \) -print0 \
            | xargs -0 clang-format-22 --dry-run --Werror
